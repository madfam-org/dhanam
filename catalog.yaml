coupons:
  founding_member_mx:
    # Year-1 onboarding deal (was "40% forever" — PRICING_OVERHAUL_20260417.md
    # flagged "forever" as industry-unusual; CONTPAQi caps at year 1,
    # Alegra caps at 25% annual commit). Paired with
    # founding_member_mx_year2 for a deliberate ramp to list.
    name: "MADFAM Founding Member (Mexico) — Year 1"
    percent_off: 40
    duration: repeating
    duration_months: 12
    products: [karafiel, dhanam, tezca, routecraft]

  founding_member_mx_year2:
    # Automatic follow-on when founding_member_mx expires. Sales ops
    # apply this via Stripe subscription-update when the 12-month
    # window lapses. Soft ramp so founding cohort doesn't churn the
    # moment list pricing bites.
    name: "MADFAM Founding Member (Mexico) — Year 2"
    percent_off: 20
    duration: repeating
    duration_months: 12
    products: [karafiel, dhanam, tezca, routecraft]

  launch_intro:
    name: "Dhanam Launch Intro"
    amount_off_cents: 400
    currency: usd
    duration: repeating
    duration_months: 3
    products: [dhanam]

  latam_regional:
    # Time-bounded per 2026-04-17 approval. Prior "45% forever" trained
    # LATAM users to expect a permanent discount, making list pricing
    # impossible to re-anchor. Same ramp philosophy as founding_member_mx:
    # deep year-1 entry + softer year-2 + list in year-3. PPP / regional
    # pricing will eventually supersede this coupon via the
    # `regional_factors` schema noted at the top of this file.
    name: "LATAM Regional Discount — Year 1"
    percent_off: 45
    duration: repeating
    duration_months: 12
    products: [dhanam, selva, fortuna]

  latam_regional_year2:
    # Automatic follow-on. Sales ops apply via Stripe subscription-update
    # when latam_regional expires at month 12. Soft ramp keeps cohort
    # from churning when list-pricing bites.
    name: "LATAM Regional Discount — Year 2"
    percent_off: 25
    duration: repeating
    duration_months: 12
    products: [dhanam, selva, fortuna]

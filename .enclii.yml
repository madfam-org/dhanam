# Dhanam - Community Wealth Management Platform
# Deploy via Enclii

apiVersion: enclii.dev/v1
kind: Service
metadata:
  name: dhanam-web
  project: dhanam
  description: Dhanam web app and public landing surface

# RFC 0001 promotion policy — Dhanam is Pattern B (manual gate) because it
# is the billing boundary for the MADFAM ecosystem. A wrong promote is
# expensive (wrong Stripe charges, wrong SPEI refund amounts, wrong
# ecosystem webhook relay). The promote-to-prod.yml workflow's scheduled
# auto-promote job is disabled via the repo variable AUTO_PROMOTE_ENABLED
# (default: unset -> evaluated as "false"); leaving this value "manual"
# here is the policy record.
promotion:
  pattern: manual
  min_soak_minutes: 30
  require_smoke_pass: true

spec:
  build:
    type: dockerfile
    dockerfile: apps/web/Dockerfile
    context: .
    args:
      NEXT_PUBLIC_API_URL: https://api.dhan.am/v1
      NEXT_PUBLIC_BASE_URL: https://app.dhan.am
      NEXT_PUBLIC_ADMIN_URL: https://admin.dhan.am
      NEXT_PUBLIC_OIDC_ISSUER: https://auth.madfam.io
      NEXT_PUBLIC_OIDC_CLIENT_ID: jnc_uE2zp9ume_Fd6jMl1elL6wqjiECM711t
      NEXT_PUBLIC_JANUA_API_URL: https://auth.madfam.io
      NEXT_PUBLIC_AUTH_MODE: janua
      NEXT_PUBLIC_HERO_IPAD_ENABLED: "true"
      NEXT_PUBLIC_HERO_IPAD_3D: "true"
    source:
      git:
        repository: https://github.com/madfam-org/dhanam
        branch: main
        autoDeploy: true

  runtime:
    port: 4200
    replicas: 2
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"

    healthCheck: /api/health
    readinessProbe:
      path: /api/health
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 3
    livenessProbe:
      path: /api/health
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 3

  env:
    - name: PORT
      value: "4200"
    - name: NODE_ENV
      value: production
    # Next.js public env vars (baked at build time)
    - name: NEXT_PUBLIC_API_URL
      value: https://api.dhan.am/v1
    - name: NEXT_PUBLIC_BASE_URL
      value: https://app.dhan.am
    - name: NEXT_PUBLIC_ADMIN_URL
      value: https://admin.dhan.am

    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: dhanam-secrets
          key: database-url

    - name: REDIS_URL
      valueFrom:
        secretKeyRef:
          name: dhanam-secrets
          key: redis-url

    # Janua SSO - API URL for OAuth flows
    - name: NEXT_PUBLIC_JANUA_API_URL
      value: https://api.janua.dev
    # OIDC Configuration
    - name: NEXT_PUBLIC_OIDC_ISSUER
      value: https://auth.madfam.io
    - name: NEXT_PUBLIC_OIDC_CLIENT_ID
      value: jnc_uE2zp9ume_Fd6jMl1elL6wqjiECM711t
    - name: NEXT_PUBLIC_HERO_IPAD_ENABLED
      value: "true"
    - name: NEXT_PUBLIC_HERO_IPAD_3D
      value: "true"
    - name: OIDC_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: dhanam-secrets
          key: janua-client-secret

    # MADFAM Analytics
    - name: NEXT_PUBLIC_ANALYTICS_URL
      value: https://analytics.madfam.io
    - name: NEXT_PUBLIC_ANALYTICS_SITE_ID
      value: dhanam

    # Coforma Feedback
    - name: NEXT_PUBLIC_COFORMA_URL
      value: https://coforma.madfam.io
    - name: NEXT_PUBLIC_COFORMA_PRODUCT_ID
      value: dhanam

    # AI Provider
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: dhanam-secrets
          key: openai-api-key

    # Error Monitoring
    - name: SENTRY_DSN
      valueFrom:
        secretKeyRef:
          name: dhanam-secrets
          key: sentry-dsn
    - name: SENTRY_RELEASE
      value: dhanam-web@latest

  domains:
    # Production domain (primary)
    - domain: app.dhan.am
      tls: true
      tlsIssuer: cloudflare
      primary: true
    # Landing / SEO domain (apex)
    - domain: dhan.am
      tls: true
      tlsIssuer: cloudflare
    # Landing / SEO domain. The web middleware owns the www -> apex 301 so
    # Enclii does not synthesize a redirect that can leak the internal port.
    - domain: www.dhan.am
      tls: true
      tlsIssuer: cloudflare

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70

  slo:
    availability: 99.9
    latencyP95: 300
    errorRate: 0.5

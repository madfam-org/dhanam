# Operator workflow: sync catalog.yaml → Dhanam DB + Stripe (production).
#
# Enclii-first: production credentials live in the GitHub Production environment
# (copy from Enclii Lockbox / Vault). Do not duplicate secrets into repo secrets.
#
# Required secrets (Settings → Environments → Production):
#   DATABASE_URL
#   STRIPE_SECRET_KEY
#   STRIPE_MX_SECRET_KEY
#   NPM_MADFAM_TOKEN (repo/org secret — needed for pnpm install)
#
# After live sync, catalog:drift verifies the public API matches catalog.yaml.
# See scripts/sync-catalog-prod.md and docs/CATALOG_TRUTH_2026-05-20.md.

name: Sync production catalog

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only (no DB/Stripe writes)"
        required: false
        default: true
        type: boolean
      reason:
        description: "Why are you syncing now? (audit log)"
        required: true
        type: string

concurrency:
  group: sync-catalog-prod
  cancel-in-progress: false

jobs:
  sync:
    name: sync-catalog.ts
    # The prod DB is only reachable in-cluster (postgres.data.svc.cluster.local),
    # so run on the self-hosted ARC runner when bootstrapped; GitHub-hosted
    # runners cannot resolve cluster DNS. Falls back to ubuntu-latest pre-ARC
    # (dry-run still works there; live sync requires the in-cluster runner).
    runs-on: ${{ vars.ARC_BOOTSTRAP_COMPLETE == 'true' && 'madfam-runners-blue' || 'ubuntu-latest' }}
    environment: Production
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false
          standalone: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - name: Configure npm registry
        run: |
          echo "@madfam:registry=https://npm.madfam.io" >> ~/.npmrc
          echo "@dhanam:registry=https://npm.madfam.io" >> ~/.npmrc
          echo "@janua:registry=https://npm.madfam.io" >> ~/.npmrc
          echo "//npm.madfam.io/:_authToken=${{ secrets.NPM_MADFAM_TOKEN }}" >> ~/.npmrc

      - name: Install dependencies
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: pnpm install --frozen-lockfile

      - name: Preflight Production secrets
        if: inputs.dry_run == false
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_MX_SECRET_KEY: ${{ secrets.STRIPE_MX_SECRET_KEY }}
        run: |
          set -euo pipefail
          # MX-only model: the Mexico Stripe account settles to BBVA (MXN) and
          # presents USD/other currencies for global sales. Required: DATABASE_URL
          # + STRIPE_MX_SECRET_KEY. STRIPE_SECRET_KEY (a separate global account)
          # is OPTIONAL — only set it once a dedicated global Stripe entity exists.
          missing=()
          [ -z "${DATABASE_URL:-}" ] && missing+=("DATABASE_URL")
          [ -z "${STRIPE_MX_SECRET_KEY:-}" ] && missing+=("STRIPE_MX_SECRET_KEY")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ERROR: GitHub Production environment is missing secrets: ${missing[*]}"
            echo "Add them under Settings → Environments → Production (from Enclii Lockbox)."
            echo "Operator fallback: scripts/sync-catalog-prod.md → internal-devops runbook."
            exit 1
          fi
          if [ -z "${STRIPE_SECRET_KEY:-}" ]; then
            echo "NOTE: STRIPE_SECRET_KEY (global account) not set — running MX-only. USD prices are created on the MX account (multi-currency presentment)."
          fi
          echo "::add-mask::$DATABASE_URL"
          echo "::add-mask::$STRIPE_MX_SECRET_KEY"
          echo "DATABASE_URL=$DATABASE_URL" >> "$GITHUB_ENV"
          echo "STRIPE_MX_SECRET_KEY=$STRIPE_MX_SECRET_KEY" >> "$GITHUB_ENV"
          if [ -n "${STRIPE_SECRET_KEY:-}" ]; then
            echo "::add-mask::$STRIPE_SECRET_KEY"
            echo "STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY" >> "$GITHUB_ENV"
          fi

      - name: Run catalog sync (dry-run)
        if: inputs.dry_run == true
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: |
          echo "Reason: ${{ inputs.reason }}"
          pnpm --filter @dhanam/api exec tsx ../../scripts/sync-catalog.ts --dry-run

      - name: Run catalog sync (live)
        if: inputs.dry_run == false
        run: |
          echo "Reason: ${{ inputs.reason }}"
          pnpm --filter @dhanam/api exec tsx ../../scripts/sync-catalog.ts

      - name: Verify catalog drift (live)
        if: inputs.dry_run == false
        run: pnpm catalog:drift -- --json

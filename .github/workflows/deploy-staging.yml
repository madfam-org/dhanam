# PP.2b (RFC 0001 Phase 2) — Dhanam staging deploy.
#
# Replaces the previous `kubectl apply -k` push-based deploy with a GitOps
# flow: CI builds and signs the three images (api/web/admin), patches their
# digests into infra/k8s/overlays/staging/kustomization.yaml, commits, and
# lets the dhanam-staging ArgoCD Application reconcile. Post-reconcile smoke
# attempts to verify ArgoCD/live Deployment digests when the runner can reach
# the cluster API, then hits https://staging-api.dhan.am/health with 6 retries
# x 20s like Karafiel. Set STAGING_STRICT_DIGEST_PROOF=true once Enclii exposes
# a routine proof adapter or the runner can reach the API server reliably.
#
# Triggered on every push to main. Does NOT touch production — that's the
# promote-to-prod workflow's job (PP.2c).

name: Deploy to Staging

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'llms.txt'
      - 'llms-full.txt'
      - 'infra/k8s/overlays/staging/kustomization.yaml' # staging digest bot commits don't self-trigger
      - 'infra/k8s/production/kustomization.yaml' # prod promotions don't rebuild
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  API_IMAGE: madfam-org/dhanam/api
  WEB_IMAGE: madfam-org/dhanam/web
  ADMIN_IMAGE: madfam-org/dhanam/admin

jobs:
  build-api:
    name: Build API staging image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      short: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'
      - id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:staging-${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:staging-latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
      - name: Sign API staging image
        if: steps.push.outcome == 'success'
        env:
          COSIGN_EXPERIMENTAL: 'true'
        run: cosign sign --yes ${{ env.REGISTRY }}/${{ env.API_IMAGE }}@${{ steps.push.outputs.digest }}

  build-web:
    name: Build Web staging image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      short: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'
      - id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}:staging-${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}:staging-latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.STAGING_WEB_API_URL || 'https://staging-api.dhan.am/v1' }}
            NEXT_PUBLIC_BASE_URL=${{ vars.STAGING_WEB_URL || 'https://staging.dhan.am' }}
            NEXT_PUBLIC_ADMIN_URL=${{ vars.STAGING_ADMIN_URL || 'https://staging-admin.dhan.am' }}
            NEXT_PUBLIC_OIDC_ISSUER=${{ vars.STAGING_OIDC_ISSUER || '' }}
            NEXT_PUBLIC_OIDC_CLIENT_ID=${{ vars.STAGING_OIDC_CLIENT_ID || '' }}
            NEXT_PUBLIC_JANUA_API_URL=${{ vars.STAGING_JANUA_API_URL || '' }}
            NEXT_PUBLIC_HERO_IPAD_ENABLED=true
            NEXT_PUBLIC_HERO_IPAD_3D=true
          secrets: |
            npm_madfam_token=${{ secrets.NPM_MADFAM_TOKEN }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
      - name: Sign Web staging image
        if: steps.push.outcome == 'success'
        env:
          COSIGN_EXPERIMENTAL: 'true'
        run: cosign sign --yes ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}@${{ steps.push.outputs.digest }}

  build-admin:
    name: Build Admin staging image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      short: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'
      - id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ADMIN_IMAGE }}:staging-${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/${{ env.ADMIN_IMAGE }}:staging-latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.STAGING_ADMIN_API_URL || vars.STAGING_WEB_API_URL || 'https://staging-api.dhan.am/v1' }}
            NEXT_PUBLIC_APP_URL=${{ vars.STAGING_WEB_URL || 'https://staging.dhan.am' }}
            NEXT_PUBLIC_OIDC_ISSUER=${{ vars.STAGING_OIDC_ISSUER || '' }}
          cache-from: type=gha,scope=admin
          cache-to: type=gha,scope=admin,mode=max
      - name: Sign Admin staging image
        if: steps.push.outcome == 'success'
        env:
          COSIGN_EXPERIMENTAL: 'true'
        run: cosign sign --yes ${{ env.REGISTRY }}/${{ env.ADMIN_IMAGE }}@${{ steps.push.outputs.digest }}

  update-staging-overlay:
    name: Patch staging overlay digests
    needs: [build-api, build-web, build-admin]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      staging_revision: ${{ steps.patch.outputs.staging_revision }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Patch overlay image digests
        id: patch
        env:
          API_DIGEST: ${{ needs.build-api.outputs.digest }}
          WEB_DIGEST: ${{ needs.build-web.outputs.digest }}
          ADMIN_DIGEST: ${{ needs.build-admin.outputs.digest }}
          SHORT: ${{ needs.build-api.outputs.short }}
        run: |
          set -euo pipefail
          FILE="infra/k8s/overlays/staging/kustomization.yaml"

          git config user.name "madfam-deploy-bot"
          git config user.email "deploy-bot@madfam.io"

          # Builds run in parallel and can outlive another push to main. Reset
          # to the latest main before each patch attempt so the digest commit
          # stays fast-forwardable and does not discard newer stabilization work.
          for ATTEMPT in 1 2 3; do
            echo "Staging digest push attempt $ATTEMPT/3"
            git fetch origin main
            git reset --hard origin/main

            python3 <<PY
          import os, re, pathlib
          path = pathlib.Path("$FILE")
          text = path.read_text()

          def patch(text, image, digest):
              pattern = (
                  r'(name:\s+' + re.escape(image)
                  + r'\n\s+digest:\s+)sha256:[a-f0-9]+'
              )
              return re.sub(pattern, lambda m: m.group(1) + digest, text)

          text = patch(text, "ghcr.io/madfam-org/dhanam/api",   os.environ["API_DIGEST"])
          text = patch(text, "ghcr.io/madfam-org/dhanam/web",   os.environ["WEB_DIGEST"])
          text = patch(text, "ghcr.io/madfam-org/dhanam/admin", os.environ["ADMIN_DIGEST"])
          path.write_text(text)
          PY

            git add "$FILE"
            git diff --staged --quiet && {
              STAGING_REVISION="$(git rev-parse HEAD)"
              echo "No digest change — skipping push at $STAGING_REVISION"
              echo "staging_revision=$STAGING_REVISION" >> "$GITHUB_OUTPUT"
              exit 0
            }
            git commit -m "deploy(staging): update digests to $SHORT"

            if git push origin main; then
              STAGING_REVISION="$(git rev-parse HEAD)"
              echo "Staging digest push succeeded on attempt $ATTEMPT at $STAGING_REVISION"
              echo "staging_revision=$STAGING_REVISION" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Staging digest push failed, retrying..."
            sleep $((ATTEMPT * 2))
          done
          echo "ERROR: Failed to push staging digests after 3 attempts"
          exit 1

  smoke:
    name: Staging smoke test
    needs: [build-api, build-web, build-admin, update-staging-overlay]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_PRODUCTION }}
          STRICT_DIGEST_PROOF: ${{ vars.STAGING_STRICT_DIGEST_PROOF || 'false' }}
        run: |
          set -euo pipefail
          if [ -z "${KUBECONFIG_B64:-}" ]; then
            echo "::warning::KUBECONFIG_PRODUCTION is not configured; skipping best-effort live digest proof."
            if [ "$STRICT_DIGEST_PROOF" = "true" ]; then
              echo "::error::STAGING_STRICT_DIGEST_PROOF=true requires KUBECONFIG_PRODUCTION."
              exit 1
            fi
            exit 0
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Wait for ArgoCD reconcile and live digests
        env:
          STAGING_REVISION: ${{ needs.update-staging-overlay.outputs.staging_revision }}
          EXPECTED_API_IMAGE: ghcr.io/${{ env.API_IMAGE }}@${{ needs.build-api.outputs.digest }}
          EXPECTED_WEB_IMAGE: ghcr.io/${{ env.WEB_IMAGE }}@${{ needs.build-web.outputs.digest }}
          EXPECTED_ADMIN_IMAGE: ghcr.io/${{ env.ADMIN_IMAGE }}@${{ needs.build-admin.outputs.digest }}
          STRICT_DIGEST_PROOF: ${{ vars.STAGING_STRICT_DIGEST_PROOF || 'false' }}
        run: |
          set -euo pipefail
          if [ -z "${STAGING_REVISION:-}" ]; then
            echo "::error::Missing staging digest commit revision from update-staging-overlay."
            exit 1
          fi

          if ! kubectl version --request-timeout=5s >/dev/null 2>&1; then
            echo "::warning::Cluster API is unreachable from this runner; skipping best-effort live digest proof and continuing to public staging smoke."
            echo "::warning::Keep the Enclii staging digest-proof adapter gap open until this proof is available through the routine control plane."
            if [ "$STRICT_DIGEST_PROOF" = "true" ]; then
              echo "::error::STAGING_STRICT_DIGEST_PROOF=true requires reachable cluster API or an Enclii-backed proof adapter."
              exit 1
            fi
            exit 0
          fi

          refreshed=false
          for attempt in 1 2 3 4; do
            if kubectl -n argocd annotate application dhanam-staging argocd.argoproj.io/refresh=hard --overwrite; then
              refreshed=true
              break
            fi
            echo "ArgoCD hard refresh attempt $attempt failed; retrying in 15s"
            sleep 15
          done
          if [ "$refreshed" != "true" ]; then
            echo "::error::Unable to request ArgoCD hard refresh for dhanam-staging."
            exit 1
          fi

          deadline=$((SECONDS + 600))
          while [ "$SECONDS" -lt "$deadline" ]; do
            revision="$(kubectl -n argocd get application dhanam-staging -o jsonpath='{.status.sync.revision}' 2>/dev/null || true)"
            sync="$(kubectl -n argocd get application dhanam-staging -o jsonpath='{.status.sync.status}' 2>/dev/null || true)"
            health="$(kubectl -n argocd get application dhanam-staging -o jsonpath='{.status.health.status}' 2>/dev/null || true)"
            api_image="$(kubectl -n enclii-dhanam-staging get deploy dhanam-api -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)"
            web_image="$(kubectl -n enclii-dhanam-staging get deploy dhanam-web -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)"
            admin_image="$(kubectl -n enclii-dhanam-staging get deploy dhanam-admin -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)"

            echo "revision=$revision sync=$sync health=$health"
            echo "api=$api_image"
            echo "web=$web_image"
            echo "admin=$admin_image"

            if [ "$revision" = "$STAGING_REVISION" ] \
              && [ "$sync" = "Synced" ] \
              && [ "$health" = "Healthy" ] \
              && [ "$api_image" = "$EXPECTED_API_IMAGE" ] \
              && [ "$web_image" = "$EXPECTED_WEB_IMAGE" ] \
              && [ "$admin_image" = "$EXPECTED_ADMIN_IMAGE" ]; then
              kubectl -n enclii-dhanam-staging rollout status deployment/dhanam-api --timeout=120s
              kubectl -n enclii-dhanam-staging rollout status deployment/dhanam-web --timeout=120s
              kubectl -n enclii-dhanam-staging rollout status deployment/dhanam-admin --timeout=120s
              exit 0
            fi

            sleep 15
          done

          echo "::error::Staging did not reconcile to revision $STAGING_REVISION and expected image digests."
          exit 1

      - name: API health check (6x retry x 20s)
        run: |
          URL="${{ vars.STAGING_API_URL || 'https://staging-api.dhan.am' }}"
          for i in 1 2 3 4 5 6; do
            if curl -fsS --max-time 10 "$URL/health" > /dev/null; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "attempt $i unhealthy, retrying"
            sleep 20
          done
          echo "::error::Staging API failed health check after 6 attempts ($URL/health)"
          exit 1

      - name: Web route and API env check
        run: |
          URL="${{ vars.STAGING_WEB_URL || 'https://staging.dhan.am' }}"
          API_URL="${{ vars.STAGING_WEB_API_URL || 'https://staging-api.dhan.am/v1' }}"
          API_ORIGIN="${API_URL%/v1}"
          for i in 1 2 3 4 5 6; do
            HEADERS="$(curl -fsSIL --max-time 10 "$URL" || true)"
            if printf '%s' "$HEADERS" | grep -F "$API_ORIGIN" > /dev/null; then
              echo "Web smoke passed on attempt $i"
              exit 0
            fi
            echo "attempt $i web route/env not ready, retrying"
            sleep 20
          done
          echo "::error::Staging web did not expose expected API origin $API_ORIGIN"
          exit 1

      - name: Admin route and API env check
        run: |
          URL="${{ vars.STAGING_ADMIN_URL || 'https://staging-admin.dhan.am' }}"
          API_URL="${{ vars.STAGING_ADMIN_API_URL || vars.STAGING_WEB_API_URL || 'https://staging-api.dhan.am/v1' }}"
          API_ORIGIN="${API_URL%/v1}"
          for i in 1 2 3 4 5 6; do
            HEADERS="$(curl -fsSIL --max-time 10 "$URL/login" || true)"
            if printf '%s' "$HEADERS" | grep -F "$API_ORIGIN" > /dev/null; then
              echo "Admin smoke passed on attempt $i"
              exit 0
            fi
            echo "attempt $i admin route/env not ready, retrying"
            sleep 20
          done
          echo "::error::Staging admin did not expose expected API origin $API_ORIGIN"
          exit 1

      - name: Commercial billing smoke (public tier)
        run: |
          chmod +x scripts/staging-commercial-smoke.sh
          STAGING_API_URL="${{ vars.STAGING_API_URL || 'https://staging-api.dhan.am' }}" \
          STAGING_COMMERCIAL_ADMIN_TOKEN="${{ secrets.STAGING_COMMERCIAL_ADMIN_TOKEN }}" \
          STAGING_COMMERCIAL_SMOKE_USER_ID="${{ secrets.STAGING_COMMERCIAL_SMOKE_USER_ID }}" \
          STAGING_COMMERCIAL_CHARGE_ENABLED="${{ vars.STAGING_COMMERCIAL_CHARGE_ENABLED || 'false' }}" \
          STAGING_COMMERCIAL_STRICT="${{ vars.STAGING_COMMERCIAL_STRICT || 'false' }}" \
            ./scripts/staging-commercial-smoke.sh

      - name: Golden product webhook envelope probe (WS3)
        run: node scripts/golden-probes/verify-product-webhook-envelope.mjs

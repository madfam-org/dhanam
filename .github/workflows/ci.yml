name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  networkpolicy-port-lint:
    name: NetworkPolicy port consistency
    runs-on: ubuntu-latest
    timeout-minutes: 3
    # Prevents the 2026-05-04 status.enclii.dev outage class:
    # NetworkPolicy `ports:` clauses that don't intersect the selected pods'
    # containerPorts (silent CNI drop, hours to diagnose).
    # See scripts/check-networkpolicy-ports.py for full rationale.
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Run NetworkPolicy port lint
        run: python3 scripts/check-networkpolicy-ports.py infra/k8s/

  public-repo-leakage:
    name: Public repo leakage guard
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: Run public repo leakage check
        run: python3 scripts/check-public-repo-leakage.py

  k8s-env-lint:
    name: K8s Env-Var Conflict Linter
    runs-on: ubuntu-latest
    timeout-minutes: 3
    # Refs: 2026-05-04 dhanam-api ArgoCD sync regression — env entries with
    # both `value` and `valueFrom` are ambiguous and ArgoCD treats them as
    # drift. This job catches the bug pattern in source manifests so it can't
    # land via a misapplied kustomize patch or hand-edit again.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install --quiet "pyyaml>=6.0"

      - name: Lint K8s manifests for value/valueFrom conflicts
        run: python3 scripts/lint-k8s-env.py infra/k8s

      - name: Run infrastructure guard unit tests
        run: |
          python3 -m unittest discover -s tests/fixtures/k8s-env-lint -p 'test_*.py' -v
          python3 -m unittest discover -s tests/fixtures/workflow-guards -p 'test_*.py' -v

  doc-links:
    name: Documentation link hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: Check primary documentation links
        run: python3 scripts/check-doc-links.py --primary
      - name: Check all docs/ links
        run: python3 scripts/check-doc-links.py --all-docs

      - name: Validate staging commercial smoke script
        run: bash scripts/staging-commercial-smoke.test.sh

  validate:
    name: Validate Lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Configure npm registry
        run: |
          echo "@madfam:registry=https://npm.madfam.io" >> ~/.npmrc
          echo "@dhanam:registry=https://npm.madfam.io" >> ~/.npmrc
          echo "@janua:registry=https://npm.madfam.io" >> ~/.npmrc
          echo "//npm.madfam.io/:_authToken=${{ secrets.NPM_MADFAM_TOKEN }}" >> ~/.npmrc

      - name: Validate lockfile is up to date
        run: |
          pnpm install --frozen-lockfile || {
            echo "❌ pnpm-lock.yaml is out of sync with package.json files."
            echo "Run 'pnpm install' locally and commit the updated lockfile."
            exit 1
          }
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost:5432/dummy'

  lint:
    name: Lint
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Configure npm registry
        run: |
          echo "@madfam:registry=https://npm.madfam.io" >> ~/.npmrc
          echo "@dhanam:registry=https://npm.madfam.io" >> ~/.npmrc
          echo "@janua:registry=https://npm.madfam.io" >> ~/.npmrc
          echo "//npm.madfam.io/:_authToken=${{ secrets.NPM_MADFAM_TOKEN }}" >> ~/.npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost:5432/dummy'

      - name: Run linting
        run: pnpm lint

  typecheck:
    name: Type Check
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Configure npm registry
        run: |
          echo "@madfam:registry=https://npm.madfam.io" >> ~/.npmrc
          echo "@dhanam:registry=https://npm.madfam.io" >> ~/.npmrc
          echo "@janua:registry=https://npm.madfam.io" >> ~/.npmrc
          echo "//npm.madfam.io/:_authToken=${{ secrets.NPM_MADFAM_TOKEN }}" >> ~/.npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost:5432/dummy'

      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          LOCAL_DB: 'yes'

      - name: Build packages
        run: pnpm build:packages

      - name: Run type checking
        run: pnpm typecheck

  test:
    name: Test
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        credentials:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: dhanam_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        credentials:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Configure npm registry
        run: |
          echo "@madfam:registry=https://npm.madfam.io" >> ~/.npmrc
          echo "@dhanam:registry=https://npm.madfam.io" >> ~/.npmrc
          echo "@janua:registry=https://npm.madfam.io" >> ~/.npmrc
          echo "//npm.madfam.io/:_authToken=${{ secrets.NPM_MADFAM_TOKEN }}" >> ~/.npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          DATABASE_URL: 'postgresql://test:test@localhost:5432/dhanam_test'

      - name: Setup test environment
        run: |
          cp apps/api/.env.example apps/api/.env
          echo "DATABASE_URL=postgresql://test:test@localhost:5432/dhanam_test" >> apps/api/.env
          echo "REDIS_URL=redis://localhost:6379" >> apps/api/.env
          echo "JWT_SECRET=$(openssl rand -hex 32)" >> apps/api/.env
          echo "JWT_REFRESH_SECRET=$(openssl rand -hex 32)" >> apps/api/.env
          echo "ENCRYPTION_KEY=ci-test-encryption-key-exactly32" >> apps/api/.env
          echo "POSTHOG_HOST=https://analytics.madfam.io" >> apps/api/.env

      - name: Generate Prisma Client
        working-directory: apps/api
        run: pnpm prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/dhanam_test

      - name: Run database migrations
        working-directory: apps/api
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/dhanam_test

      - name: Build packages
        run: pnpm build:packages

      - name: Validate Jest configuration
        run: |
          cd apps/api
          # Verify Jest can load without module errors
          pnpm jest --listTests > /dev/null 2>&1 || {
            echo "❌ Jest configuration has module resolution issues"
            pnpm jest --listTests 2>&1 | head -20
            exit 1
          }
          echo "✅ Jest configuration valid"

      - name: Run tests
        run: pnpm test

      - name: Run security audit
        run: pnpm audit --audit-level=high || true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          name: codecov-umbrella


        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Configure npm registry
        run: |
          echo "@madfam:registry=https://npm.madfam.io" >> ~/.npmrc
          echo "@dhanam:registry=https://npm.madfam.io" >> ~/.npmrc
          echo "@janua:registry=https://npm.madfam.io" >> ~/.npmrc
          echo "//npm.madfam.io/:_authToken=${{ secrets.NPM_MADFAM_TOKEN }}" >> ~/.npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          DATABASE_URL: 'postgresql://test:test@localhost:5432/dhanam_pw'

      - name: Setup Playwright environment
        run: |
          cp apps/api/.env.example apps/api/.env
          echo "DATABASE_URL=postgresql://test:test@localhost:5432/dhanam_pw" >> apps/api/.env
          echo "REDIS_URL=redis://localhost:6379" >> apps/api/.env
          echo "JWT_SECRET=$(openssl rand -hex 32)" >> apps/api/.env
          echo "JWT_REFRESH_SECRET=$(openssl rand -hex 32)" >> apps/api/.env
          echo "ENCRYPTION_KEY=ci-test-encryption-key-exactly32" >> apps/api/.env

      - name: Generate Prisma Client
        working-directory: apps/api
        run: pnpm prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/dhanam_pw

      - name: Run database migrations
        working-directory: apps/api
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/dhanam_pw

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: apps/web

      - name: Build packages, API, and web app
        run: |
          pnpm build:packages
          pnpm --dir apps/api build
          pnpm --dir apps/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4010/v1
          NEXT_PUBLIC_BASE_URL: http://localhost:3040
          NEXT_PUBLIC_ADMIN_URL: http://localhost:3400

      - name: Start API server
        working-directory: apps/api
        run: pnpm start:prod &
        env:
          PORT: 4010
          DATABASE_URL: postgresql://test:test@localhost:5432/dhanam_pw
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-playwright-jwt-secret-32chars
          JWT_REFRESH_SECRET: ci-playwright-refresh-32chars0
          ENCRYPTION_KEY: ci-test-encryption-key-exactly32
          NODE_ENV: test

      - name: Wait for API server
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:4010/v1/monitoring/health/live >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          curl -fsS http://localhost:4010/v1/monitoring/health/live

      - name: Start web app
        working-directory: apps/web
        run: pnpm start &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4010/v1
          NEXT_PUBLIC_BASE_URL: http://localhost:3040
          NEXT_PUBLIC_ADMIN_URL: http://localhost:3400

      - name: Wait for web app
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3040 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          curl -fsS http://localhost:3040

      - name: Run Playwright tests
        working-directory: apps/web
        run: pnpm exec playwright test --project=chromium
        env:
          E2E_BASE_URL: http://localhost:3040
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7


name: Publish Package

on:
  push:
    tags:
      - '@dhanam/shared@*'
      - '@dhanam/esg@*'
      - '@dhanam/simulations@*'
      - '@dhanam/billing-sdk@*'

  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - '@dhanam/shared'
          - '@dhanam/esg'
          - '@dhanam/simulations'
          - '@dhanam/billing-sdk'
      dry_run:
        description: 'Dry run (no actual publish)'
        required: false
        type: boolean
        default: true

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve package & version
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.meta.outputs.package_name }}
      package_dir: ${{ steps.meta.outputs.package_dir }}
      version: ${{ steps.meta.outputs.version }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
    steps:
      - name: Parse tag or dispatch input
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PACKAGE="${{ inputs.package }}"
            DRY_RUN="${{ inputs.dry_run }}"
          else
            # Tag format: @dhanam/<name>@<version>
            TAG="${GITHUB_REF#refs/tags/}"
            PACKAGE="${TAG%@[0-9]*}"
            DRY_RUN="false"
          fi

          # Extract directory name from package name
          DIR="${PACKAGE#@dhanam/}"

          echo "package_name=${PACKAGE}" >> "$GITHUB_OUTPUT"
          echo "package_dir=packages/${DIR}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${DRY_RUN}" >> "$GITHUB_OUTPUT"

          # Resolve version from tag or package.json (will be verified later)
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG##*@}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish ${{ needs.resolve.outputs.package_name }}
    needs: resolve
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        # Filter to just the package being published (+ its workspace deps).
        # Avoids two problems:
        #   1. apps/api postinstall needs DATABASE_URL (not available here)
        #   2. apps/mobile lockfile drift blocks the entire workspace
        # Also --ignore-scripts for belt-and-braces. The publishable packages
        # (billing-sdk, shared, esg, simulations) have no lifecycle scripts.
        run: pnpm install --frozen-lockfile --ignore-scripts --filter '${{ needs.resolve.outputs.package_name }}...'

      - name: Authenticate to npm.madfam.io
        # OVERWRITE not append — self-hosted ARC runners can persist a
        # stale ~/.npmrc between jobs; npm reads the first matching
        # _authToken= line, so append would silently use the cached
        # token. Plus a whoami pre-flight catches secret-rotation drift
        # before the publish step rather than during it.
        run: |
          if [ -z "${NPM_MADFAM_TOKEN}" ]; then
            echo "::error::NPM_MADFAM_TOKEN is empty — org secret not exposed to this job"
            exit 1
          fi
          # Append auth token to the REPO-LEVEL ./.npmrc (already has the
          # @dhanam/@madfam/@janua/@cotiza/@fortuna scope mappings + the
          # commented `# //npm.madfam.io/:_authToken=...` placeholder).
          # Writing to ~/.npmrc didn't help on self-hosted ARC runners
          # because pnpm prefers project-local config; whoami still got
          # ENEEDAUTH.
          printf '\n//npm.madfam.io/:_authToken=%s\n' "${NPM_MADFAM_TOKEN}" >> .npmrc
          chmod 600 .npmrc
          # Sanity check (token-redacted)
          echo "--- .npmrc (token redacted) ---"
          sed 's/_authToken=.*/_authToken=<REDACTED>/' .npmrc
          echo "-------------------------------"
          echo "--- Token diagnostics ---"
          echo "TOKEN_LEN=${#NPM_MADFAM_TOKEN}"
          # Direct HTTP whoami via curl (bypasses npm CLI config) — proves
          # whether the token itself works against the registry vs. an
          # npm-side config issue.
          HTTP_CODE=$(curl -sw '%{http_code}' -o /tmp/whoami_resp \
            -H "Authorization: Bearer ${NPM_MADFAM_TOKEN}" \
            https://npm.madfam.io/-/whoami) || true
          echo "curl /-/whoami → HTTP ${HTTP_CODE}"
          echo "body: $(cat /tmp/whoami_resp 2>/dev/null | head -c 200)"
          echo "-------------------------------"
          if WHO=$(npm whoami --registry=https://npm.madfam.io/ 2>&1); then
            echo "authenticated as: ${WHO}"
          else
            echo "::error::npm whoami failed against npm.madfam.io: ${WHO}"
            exit 1
          fi
        env:
          NPM_MADFAM_TOKEN: ${{ secrets.NPM_MADFAM_TOKEN }}

      - name: Build target package (and its workspace deps)
        run: pnpm --filter '${{ needs.resolve.outputs.package_name }}...' build

      - name: Typecheck target package
        run: pnpm --filter '${{ needs.resolve.outputs.package_name }}' typecheck

      - name: Test target package
        run: pnpm --filter '${{ needs.resolve.outputs.package_name }}' test

      - name: Verify version matches tag
        if: needs.resolve.outputs.version != ''
        working-directory: ${{ needs.resolve.outputs.package_dir }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ needs.resolve.outputs.version }}"
          if [ "${PKG_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Version mismatch: package.json has ${PKG_VERSION} but tag is ${TAG_VERSION}"
            exit 1
          fi
          echo "Version verified: ${PKG_VERSION}"

      - name: Publish (dry run)
        if: needs.resolve.outputs.dry_run == 'true'
        working-directory: ${{ needs.resolve.outputs.package_dir }}
        run: pnpm publish --dry-run --no-git-checks

      - name: Publish
        if: needs.resolve.outputs.dry_run != 'true'
        working-directory: ${{ needs.resolve.outputs.package_dir }}
        run: pnpm publish --no-git-checks

      - name: Create GitHub Release
        if: needs.resolve.outputs.dry_run != 'true' && needs.resolve.outputs.version != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.resolve.outputs.package_name }}@${{ needs.resolve.outputs.version }}"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            --verify-tag

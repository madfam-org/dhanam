name: Deploy Admin to K8s (GHCR)

# MADFAM-ENCLII-FIRST-WORKFLOW-EXCEPTION v1: workflow_dispatch raw K8s path is break-glass only.
# Routine production deployment must use Enclii web, API, CLI, or GitOps digest promotion.

# Manual break-glass only. Routine push-to-main deployment is handled by
# Enclii/staging plus promote-to-prod.

on:
  workflow_dispatch:
    inputs:
      incident_id:
        description: 'Required incident or change ticket URL/ID documenting why Enclii/promotion is unavailable'
        required: true
        type: string
      break_glass_ack:
        description: 'I acknowledge this workflow is break-glass production deployment access and must record the missing Enclii adapter gap'
        required: true
        default: false
        type: boolean
      force_deploy:
        description: 'Force deployment even without code changes'
        required: false
        default: 'false'
        type: boolean
      direct_k8s_deploy:
        description: 'Also run raw kubectl rollout after committing the signed digest (break-glass; requires runner access to the cluster API)'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: madfam-org/dhanam/admin
  SERVICE_SHORT_NAME: dhanam-admin

concurrency:
  group: deploy-admin-k8s-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and Push Admin to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate break-glass authorization
        env:
          BREAK_GLASS_ACK: ${{ inputs.break_glass_ack }}
          INCIDENT_ID: ${{ inputs.incident_id }}
        run: |
          if [ "$BREAK_GLASS_ACK" != "true" ]; then
            echo "::error::Set break_glass_ack=true before using this production break-glass workflow."
            exit 1
          fi
          if [ -z "$INCIDENT_ID" ]; then
            echo "::error::incident_id is required for break-glass deployment."
            exit 1
          fi
          echo "Break-glass incident/change reference: $INCIDENT_ID"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=main,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/admin/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.dhan.am/v1

      - name: Sign image with cosign
        if: steps.build.outcome == 'success'
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Commit digest to kustomization.yaml
        if: github.ref == 'refs/heads/main'
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          echo "Updating kustomization.yaml with digest: $DIGEST"
          export DIGEST

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Retry loop: handles concurrent pushes from parallel deploy workflows
          for ATTEMPT in 1 2 3; do
            echo "Push attempt $ATTEMPT/3"
            git fetch origin main

            # Reset to latest remote main and re-apply our digest change
            git reset --hard origin/main

            python3 <<'PY'
          import os
          import pathlib
          import re
          import sys

          path = pathlib.Path("infra/k8s/production/kustomization.yaml")
          text = path.read_text()
          short_name = os.environ["SERVICE_SHORT_NAME"]
          new_name = f'{os.environ["REGISTRY"]}/{os.environ["IMAGE_NAME"]}'
          digest = os.environ["DIGEST"]
          patterns = [
              (
                  r'(-\s+digest:\s+)sha256:[a-f0-9]+(\n\s+name:\s+'
                  + re.escape(short_name)
                  + r'\n\s+newName:\s+'
                  + re.escape(new_name)
                  + r')',
                  lambda m: m.group(1) + digest + m.group(2),
              ),
              (
                  r'(-\s+name:\s+'
                  + re.escape(short_name)
                  + r'\n\s+newName:\s+'
                  + re.escape(new_name)
                  + r'\n\s+digest:\s+)sha256:[a-f0-9]+',
                  lambda m: m.group(1) + digest,
              ),
          ]
          for pattern, replacement in patterns:
              text, count = re.subn(pattern, replacement, text, count=1)
              if count:
                  path.write_text(text)
                  break
          else:
              print(f"ERROR: Could not find image entry for {short_name} -> {new_name}", file=sys.stderr)
              sys.exit(1)
          PY

            git add infra/k8s/production/kustomization.yaml
            git diff --staged --quiet && { echo "No changes to commit"; exit 0; }
            git commit -m "chore(deploy): update admin image digest to ${DIGEST:0:19}"

            if git push origin main; then
              echo "Push succeeded on attempt $ATTEMPT"
              exit 0
            fi
            echo "Push failed (likely concurrent update), retrying..."
            sleep $((ATTEMPT * 2))
          done
          echo "ERROR: Failed to push after 3 attempts"
          exit 1

      - name: Report lifecycle event
        if: always()
        continue-on-error: true
        run: |
          EVENT_TYPE="image_pushed"
          if [ "${{ steps.build.outcome }}" != "success" ]; then
            EVENT_TYPE="build_failed"
          fi

          curl -sf -X POST "https://api.enclii.dev/v1/callbacks/lifecycle-event" \
            -H "Authorization: Bearer ${{ secrets.ENCLII_CALLBACK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "repo_full_name": "madfam-org/dhanam",
              "commit_sha": "${{ github.sha }}",
              "branch": "${{ github.ref_name }}",
              "ref": "${{ github.ref }}",
              "event_type": "'"$EVENT_TYPE"'",
              "source": "ci_callback",
              "message": "Admin build '"$EVENT_TYPE"'",
              "metadata": {
                "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}",
                "digest": "${{ steps.build.outputs.digest }}",
                "workflow": "deploy-admin-k8s",
                "service": "dhanam-admin",
                "incident_id": "${{ inputs.incident_id }}"
              }
            }'

      - name: Generate build summary
        env:
          INCIDENT_ID: ${{ inputs.incident_id }}
        run: |
          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Break-glass incident/change reference**: $INCIDENT_ID" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest**: \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy to K8s (Break-Glass Direct)
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'workflow_dispatch' && inputs.direct_k8s_deploy
    environment: production

    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to K8s
        run: |
          kubectl set image deployment/dhanam-admin \
            admin=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.image_digest }} \
            -n dhanam
          kubectl rollout status deployment/dhanam-admin -n dhanam --timeout=300s

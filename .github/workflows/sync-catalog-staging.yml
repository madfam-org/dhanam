# Operator workflow: sync catalog.yaml → staging Dhanam DB + Stripe (test mode).
#
# Primary path: run sync-catalog.ts on madfam-runners-blue using GitHub
# Environment "staging" secrets (DATABASE_URL + STRIPE_MX_SECRET_KEY).
#
# Fallback: trigger the in-cluster dhanam-catalog-sync CronJob via kubectl when
# the runner can reach the API server (Enclii ops jobs trigger is preferred locally).

name: Sync staging catalog

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you syncing now? (audit log)"
        required: true
        type: string
      mode:
        description: "sync mode"
        required: false
        default: "direct"
        type: choice
        options:
          - direct
          - in-cluster

concurrency:
  group: sync-catalog-staging
  cancel-in-progress: false

jobs:
  direct-sync:
    name: Direct sync (staging env secrets)
    if: inputs.mode == 'direct'
    runs-on: ${{ vars.ARC_BOOTSTRAP_COMPLETE == 'true' && 'madfam-runners-blue' || 'ubuntu-latest' }}
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false
          standalone: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - name: Configure npm registry
        run: |
          echo "@madfam:registry=https://npm.madfam.io" >> ~/.npmrc
          echo "@dhanam:registry=https://npm.madfam.io" >> ~/.npmrc
          echo "@janua:registry=https://npm.madfam.io" >> ~/.npmrc
          echo "//npm.madfam.io/:_authToken=${{ secrets.NPM_MADFAM_TOKEN }}" >> ~/.npmrc

      - name: Install dependencies
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: pnpm install --frozen-lockfile

      - name: Preflight staging secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STRIPE_MX_SECRET_KEY: ${{ secrets.STRIPE_MX_SECRET_KEY }}
        run: |
          set -euo pipefail
          echo "Reason: ${{ inputs.reason }}"
          missing=()
          [ -z "${DATABASE_URL:-}" ] && missing+=("DATABASE_URL")
          [ -z "${STRIPE_MX_SECRET_KEY:-}" ] && missing+=("STRIPE_MX_SECRET_KEY")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::GitHub staging environment is missing secrets: ${missing[*]}"
            exit 1
          fi
          echo "::add-mask::$DATABASE_URL"
          echo "::add-mask::$STRIPE_MX_SECRET_KEY"
          echo "DATABASE_URL=$DATABASE_URL" >> "$GITHUB_ENV"
          echo "STRIPE_MX_SECRET_KEY=$STRIPE_MX_SECRET_KEY" >> "$GITHUB_ENV"

      - name: Run catalog sync (live)
        run: pnpm --filter @dhanam/api exec tsx ../../scripts/sync-catalog.ts

      - name: Verify Essentials priceIdResolvable
        run: |
          set -euo pipefail
          URL="https://staging-api.dhan.am/v1/billing/checkout/route-recommendation?country=MX&plan=essentials&product=dhanam"
          for i in 1 2 3 4 5 6; do
            body="$(curl -fsS --max-time 15 "$URL" || true)"
            if printf '%s' "$body" | jq -e '.priceIdResolvable == true' >/dev/null 2>&1; then
              echo "Essentials priceIdResolvable=true on attempt $i"
              exit 0
            fi
            echo "attempt $i: priceIdResolvable still false, retrying"
            sleep 15
          done
          echo "::error::Staging Essentials priceIdResolvable still false after catalog sync."
          curl -fsS "$URL" | jq '{priceIdResolvable, catalogPlanId, amountMinor}' || true
          exit 1

  in-cluster-sync:
    name: In-cluster CronJob sync
    if: inputs.mode == 'in-cluster'
    runs-on: ${{ vars.ARC_BOOTSTRAP_COMPLETE == 'true' && 'madfam-runners-blue' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        if: vars.ARC_BOOTSTRAP_COMPLETE == 'true'
        uses: azure/setup-kubectl@v5

      - name: Configure kubeconfig
        if: vars.ARC_BOOTSTRAP_COMPLETE == 'true'
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_PRODUCTION }}
        run: |
          set -euo pipefail
          mkdir -p ~/.kube
          printf '%s' "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Preflight cluster reachability
        id: cluster
        run: |
          set -euo pipefail
          if [ "${{ vars.ARC_BOOTSTRAP_COMPLETE }}" != "true" ]; then
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if kubectl version --request-timeout=10s >/dev/null 2>&1; then
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          else
            echo "reachable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger staging catalog sync job
        if: steps.cluster.outputs.reachable == 'true'
        run: |
          set -euo pipefail
          NS="enclii-dhanam-staging"
          STAMP="$(date -u +%Y%m%d-%H%M%S)"
          JOB="catalog-sync-${STAMP}"
          echo "Reason: ${{ inputs.reason }}"
          kubectl -n "$NS" create job "$JOB" --from=cronjob/dhanam-catalog-sync
          kubectl -n "$NS" wait --for=condition=complete "job/$JOB" --timeout=900s
          kubectl -n "$NS" logs "job/$JOB"

      - name: Verify Essentials priceIdResolvable
        if: steps.cluster.outputs.reachable == 'true'
        run: |
          set -euo pipefail
          URL="https://staging-api.dhan.am/v1/billing/checkout/route-recommendation?country=MX&plan=essentials&product=dhanam"
          for i in 1 2 3 4 5 6; do
            body="$(curl -fsS --max-time 15 "$URL" || true)"
            if printf '%s' "$body" | jq -e '.priceIdResolvable == true' >/dev/null 2>&1; then
              echo "Essentials priceIdResolvable=true on attempt $i"
              exit 0
            fi
            sleep 15
          done
          exit 1

      - name: Cluster unreachable
        if: steps.cluster.outputs.reachable != 'true'
        run: |
          echo "::error::Use mode=direct or enclii ops jobs trigger dhanam-catalog-sync -n enclii-dhanam-staging"
          exit 1

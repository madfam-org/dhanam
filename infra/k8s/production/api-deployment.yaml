# =============================================================================
# Dhanam API Deployment (NestJS)
# =============================================================================
# Backend API for personal finance and wealth management
# MADFAM Port Block: 4300-4399 (Dhanam uses 4300 for API)
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: dhanam-api
  namespace: dhanam
  labels:
    app: dhanam-api
    component: backend
    part-of: galaxy-ecosystem
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: dhanam-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: dhanam-api
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4300"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: dhanam-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: migrate
          image: dhanam-api
          imagePullPolicy: Always
          command: ["npx", "prisma", "migrate", "deploy", "--schema=prisma/schema.prisma"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dhanam-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

      containers:
        - name: api
          image: dhanam-api
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 4300
              protocol: TCP

          env:
            # =================================================================
            # Application Configuration
            # =================================================================
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4300"

            # =================================================================
            # Janua OIDC (Galaxy Ecosystem Authentication)
            # =================================================================
            - name: JANUA_ENABLED
              value: "true"
            - name: JANUA_ISSUER
              value: "https://auth.madfam.io"
            - name: JANUA_JWKS_URI
              value: "https://auth.madfam.io/.well-known/jwks.json"
            - name: JANUA_AUDIENCE
              value: "janua.dev"

            # =================================================================
            # Database (Shared PostgreSQL)
            # =================================================================
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dhanam-secrets
                  key: DATABASE_URL

            # =================================================================
            # Redis (Shared Redis)
            # =================================================================
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: dhanam-secrets
                  key: REDIS_URL

            # =================================================================
            # Billing - Stripe MX (Mexican Market)
            # =================================================================
            - name: STRIPE_MX_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: dhanam-billing-secrets
                  key: STRIPE_MX_SECRET_KEY
            - name: STRIPE_MX_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: dhanam-billing-secrets
                  key: STRIPE_MX_WEBHOOK_SECRET
            # Legacy Stripe webhook secret read by billing.controller.ts
            # (handleWebhook). Optional so missing-secret doesn't crash startup;
            # the controller self-gates on absence.
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: dhanam-billing-secrets
                  key: STRIPE_WEBHOOK_SECRET
                  optional: true
            # Business gate: when "false", livemode Stripe events are 200-ACK'd
            # with a warning per stripe-mx-spei-relay guardrails (CLAUDE.md).
            # Operator flips to "true" only after a successful test SPEI →
            # Karafiel CFDI emit roundtrip on live keys.
            - name: FEATURE_STRIPE_MXN_LIVE
              value: "false"

            # =================================================================
            # Billing - Conekta (LATAM card + SPEI direct gateway)
            # =================================================================
            # Sits alongside Stripe MX. Distinct from the Janua-routed Conekta
            # path (JanuaBillingService). All optional so Conekta can be
            # provisioned independently of Stripe rollout.
            - name: CONEKTA_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: dhanam-billing-secrets
                  key: CONEKTA_PRIVATE_KEY
                  optional: true
            - name: CONEKTA_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: dhanam-billing-secrets
                  key: CONEKTA_PUBLIC_KEY
                  optional: true
            - name: CONEKTA_WEBHOOK_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: dhanam-billing-secrets
                  key: CONEKTA_WEBHOOK_SIGNING_KEY
                  optional: true

            # =================================================================
            # Credit metering / billing-event ingest HMAC
            # =================================================================
            - name: BILLING_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: dhanam-billing-secrets
                  key: BILLING_WEBHOOK_SECRET
                  optional: true

            # =================================================================
            # Ecosystem fan-out (Karafiel CFDI + PhyneCRM engagement events)
            # =================================================================
            - name: PRODUCT_WEBHOOK_URLS
              value: "karafiel:https://api.karafiel.mx/api/v1/webhooks/dhanam,phynecrm:https://crm.madfam.io/api/v1/engagements/events"
            - name: PHYNECRM_API_URL
              value: "https://crm.madfam.io"
            - name: PHYNE_ENGAGEMENT_EVENTS_SECRET
              valueFrom:
                secretKeyRef:
                  name: dhanam-billing-secrets
                  key: PHYNE_ENGAGEMENT_EVENTS_SECRET
                  optional: true
            - name: MADFAM_EVENTS_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: dhanam-billing-secrets
                  key: MADFAM_EVENTS_WEBHOOK_SECRET
                  optional: true

            # =================================================================
            # Billing - Paddle (Global Market)
            # =================================================================
            - name: PADDLE_VENDOR_ID
              valueFrom:
                secretKeyRef:
                  name: dhanam-billing-secrets
                  key: PADDLE_VENDOR_ID
            - name: PADDLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dhanam-billing-secrets
                  key: PADDLE_API_KEY
            - name: PADDLE_CLIENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dhanam-billing-secrets
                  key: PADDLE_CLIENT_TOKEN
            - name: PADDLE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: dhanam-billing-secrets
                  key: PADDLE_WEBHOOK_SECRET
            - name: PADDLE_ENVIRONMENT
              value: "live"

            # =================================================================
            # External Integrations
            # =================================================================
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: dhanam-secrets
                  key: ENCRYPTION_KEY

            # JWT Secret (required)
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dhanam-secrets
                  key: JWT_SECRET

            # JWT Refresh Secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: dhanam-secrets
                  key: JWT_REFRESH_SECRET

            # =================================================================
            # Webhook Secrets
            # =================================================================
            - name: COTIZA_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: dhanam-secrets
                  key: COTIZA_WEBHOOK_SECRET

            # =================================================================
            # KYC - MetaMap Integration
            # =================================================================
            - name: METAMAP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: dhanam-secrets
                  key: METAMAP_CLIENT_ID
            - name: METAMAP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dhanam-secrets
                  key: METAMAP_CLIENT_SECRET
            - name: METAMAP_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: dhanam-secrets
                  key: METAMAP_WEBHOOK_SECRET

            # =================================================================
            # Federation
            # =================================================================
            - name: FEDERATION_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dhanam-secrets
                  key: FEDERATION_API_TOKEN

            # =================================================================
            # Analytics + KYC flow + Checkout host allowlist
            # Reconciled into dhanam-secrets 2026-05-04 (previously kubectl-edit
            # inline-patched on the live deployment, which blocked ArgoCD sync
            # for 25+ days). See:
            # internal-devops/runbooks/2026-05-04-dhanam-argocd-sync-incident.md
            # =================================================================
            - name: POSTHOG_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dhanam-secrets
                  key: POSTHOG_API_KEY
            - name: METAMAP_FLOW_ID
              valueFrom:
                secretKeyRef:
                  name: dhanam-secrets
                  key: METAMAP_FLOW_ID
            - name: CHECKOUT_ALLOWED_HOSTS
              valueFrom:
                secretKeyRef:
                  name: dhanam-secrets
                  key: CHECKOUT_ALLOWED_HOSTS

            # =================================================================
            # Email / SMTP
            # =================================================================
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: dhanam-secrets
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: dhanam-secrets
                  key: SMTP_PORT
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: dhanam-secrets
                  key: SMTP_USER
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dhanam-secrets
                  key: SMTP_PASSWORD
            - name: EMAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: dhanam-secrets
                  key: EMAIL_FROM

            # =================================================================
            # Banxico (FX rates)
            # =================================================================
            - name: BANXICO_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dhanam-secrets
                  key: BANXICO_API_TOKEN

            # =================================================================
            # Janua Server-Side Keys
            # =================================================================
            - name: JANUA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dhanam-janua-secrets
                  key: JANUA_API_KEY
            - name: JANUA_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: dhanam-janua-secrets
                  key: JANUA_ADMIN_KEY
            - name: JANUA_API_URL
              valueFrom:
                secretKeyRef:
                  name: dhanam-janua-secrets
                  key: JANUA_API_URL
            - name: JANUA_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: dhanam-janua-secrets
                  key: JANUA_WEBHOOK_SECRET
            - name: DHANAM_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: dhanam-janua-secrets
                  key: DHANAM_WEBHOOK_SECRET

            # =================================================================
            # Financial Integrations (from provider secrets)
            # =================================================================
            # Belvo (Mexico/LATAM banking)
            - name: BELVO_SECRET_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: dhanam-provider-secrets
                  key: BELVO_SECRET_KEY_ID
            - name: BELVO_SECRET_KEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dhanam-provider-secrets
                  key: BELVO_SECRET_KEY_PASSWORD
            - name: BELVO_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: dhanam-provider-secrets
                  key: BELVO_WEBHOOK_SECRET

            # Plaid (US/Canada banking)
            - name: PLAID_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: dhanam-provider-secrets
                  key: PLAID_CLIENT_ID
            - name: PLAID_SECRET
              valueFrom:
                secretKeyRef:
                  name: dhanam-provider-secrets
                  key: PLAID_SECRET
            - name: PLAID_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: dhanam-provider-secrets
                  key: PLAID_WEBHOOK_SECRET

            # Bitso (Crypto exchange)
            - name: BITSO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dhanam-provider-secrets
                  key: BITSO_API_KEY
            - name: BITSO_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: dhanam-provider-secrets
                  key: BITSO_API_SECRET

            # Zapper (DeFi portfolio)
            - name: ZAPPER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dhanam-provider-secrets
                  key: ZAPPER_API_KEY

            # Auth mode
            - name: AUTH_MODE
              value: "janua"

            # CORS
            - name: CORS_ORIGINS
              value: "https://app.dhan.am,https://admin.dhan.am,https://dhan.am,https://www.dhan.am"

          resources:
            requests:
              cpu: "100m"
              memory: "384Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"

          # Health checks
          startupProbe:
            httpGet:
              path: /health
              port: 4300
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 4300
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /v1/monitoring/health/live
              port: 4300
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3

          # Security
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      imagePullSecrets:
        - name: ghcr-credentials

      # Pod scheduling
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: dhanam-api
                topologyKey: kubernetes.io/hostname

---
# =============================================================================
# Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: dhanam-api
  namespace: dhanam
  labels:
    app: dhanam-api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 4300
      protocol: TCP
    - name: metrics
      port: 4300
      targetPort: 4300
      protocol: TCP
  selector:
    app: dhanam-api

---
# =============================================================================
# ServiceAccount
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dhanam-api
  namespace: dhanam

---
# =============================================================================
# Horizontal Pod Autoscaler
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dhanam-api
  namespace: dhanam
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dhanam-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dhanam-secrets
  namespace: dhanam
  labels:
    app.kubernetes.io/managed-by: enclii
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-store
    kind: ClusterSecretStore
  target:
    name: dhanam-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: secret/dhanam
        property: database_url
    - secretKey: REDIS_URL
      remoteRef:
        key: secret/dhanam
        property: redis_url
    - secretKey: JWT_SECRET
      remoteRef:
        key: secret/dhanam
        property: jwt_secret
    - secretKey: OIDC_CLIENT_ID
      remoteRef:
        key: secret/dhanam
        property: oidc_client_id
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: secret/dhanam
        property: oidc_client_secret
    - secretKey: OIDC_ISSUER
      remoteRef:
        key: secret/dhanam
        property: oidc_issuer
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: secret/dhanam
        property: stripe_secret_key
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: secret/dhanam
        property: stripe_webhook_secret
    - secretKey: SENDGRID_API_KEY
      remoteRef:
        key: secret/dhanam
        property: sendgrid_api_key
    - secretKey: POSTHOG_API_KEY
      remoteRef:
        key: secret/dhanam
        property: posthog_api_key
    - secretKey: R2_ACCESS_KEY_ID
      remoteRef:
        key: secret/dhanam
        property: r2_access_key_id
    - secretKey: R2_SECRET_ACCESS_KEY
      remoteRef:
        key: secret/dhanam
        property: r2_secret_access_key
    - secretKey: R2_ENDPOINT
      remoteRef:
        key: secret/dhanam
        property: r2_endpoint
    - secretKey: CLOUDFLARE_API_TOKEN
      remoteRef:
        key: secret/dhanam
        property: cloudflare_api_token
    - secretKey: NEXT_PUBLIC_POSTHOG_KEY
      remoteRef:
        key: secret/dhanam
        property: next_public_posthog_key
    - secretKey: SESSION_SECRET
      remoteRef:
        key: secret/dhanam
        property: session_secret
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: secret/dhanam
        property: encryption_key

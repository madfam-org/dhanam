# Dhanam Secrets Template
# Copy this file and fill in real values before applying.
# Usage: kubectl apply -f secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: dhanam-billing-secrets
  namespace: dhanam
type: Opaque
stringData:
  # REQUIRED: Stripe Mexico credentials
  STRIPE_MX_PUBLISHABLE_KEY: ""  # pk_test_... or pk_live_...
  STRIPE_MX_SECRET_KEY: ""       # sk_test_... or sk_live_...
  STRIPE_MX_WEBHOOK_SECRET: ""   # whsec_... (Stripe MX SPEI webhook)
  STRIPE_WEBHOOK_SECRET: ""      # whsec_... (legacy Stripe webhook handler in billing.controller.ts)
  STRIPE_ESSENTIALS_PRICE_ID: "" # price_...
  STRIPE_PREMIUM_PRICE_ID: ""    # price_...
  STRIPE_INTRO_COUPON_ID: ""     # Optional: $0.99/mo intro offer coupon
  # REQUIRED: Paddle global billing credentials
  PADDLE_VENDOR_ID: ""
  PADDLE_API_KEY: ""
  PADDLE_CLIENT_TOKEN: ""
  PADDLE_WEBHOOK_SECRET: ""
  PADDLE_ENVIRONMENT: "sandbox"  # "sandbox" or "live"

  # OPTIONAL: Conekta direct gateway (LATAM card + SPEI). Empty = service self-disables.
  CONEKTA_PRIVATE_KEY: ""             # HTTP Basic auth username
  CONEKTA_PUBLIC_KEY: ""              # client-side tokenization
  CONEKTA_WEBHOOK_SIGNING_KEY: ""     # HMAC-SHA256 secret for inbound webhook

  # OPTIONAL: Credit metering / billing-event ingest HMAC. Empty = endpoint 401s.
  BILLING_WEBHOOK_SECRET: ""

  # OPTIONAL: PhyndCRM engagement-events relay. Empty = service skips fan-out.
  PHYND_ENGAGEMENT_EVENTS_SECRET: "" # shared secret with PhyndCRM receiver

  # OPTIONAL: Inbound MADFAM events receiver (madfam-events.controller.ts).
  MADFAM_EVENTS_WEBHOOK_SECRET: ""

  # REQUIRED: Cotiza webhook integration
  COTIZA_WEBHOOK_SECRET: ""     # HMAC-SHA256 secret for Cotiza webhook verification

  # REQUIRED: MetaMap KYC verification
  METAMAP_CLIENT_ID: ""         # MetaMap API client ID
  METAMAP_CLIENT_SECRET: ""     # MetaMap API client secret
  METAMAP_WEBHOOK_SECRET: ""    # MetaMap webhook verification secret

  # REQUIRED: Federation API
  FEDERATION_API_TOKEN: ""      # Token for cross-service federation API calls

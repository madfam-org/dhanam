# Optional / integration keys for secret/dhanam — NOT applied until Vault paths
# are backfilled (Enclii Lockbox). ESO fails the whole resource if any property
# is missing, which blocked GitOps when these were inlined in external-secret.yaml.
#
# After Vault backfill: add this file to kustomization.yaml and sync.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dhanam-secrets-extended
  namespace: dhanam
  labels:
    app.kubernetes.io/managed-by: enclii
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-store
    kind: ClusterSecretStore
  target:
    name: dhanam-secrets
    creationPolicy: Merge
    deletionPolicy: Retain
  data:
    - secretKey: NEXTAUTH_SECRET
      remoteRef:
        key: secret/dhanam
        property: nextauth_secret
    - secretKey: COTIZA_WEBHOOK_SECRET
      remoteRef:
        key: secret/dhanam
        property: cotiza_webhook_secret
    - secretKey: METAMAP_CLIENT_ID
      remoteRef:
        key: secret/dhanam
        property: metamap_client_id
    - secretKey: METAMAP_CLIENT_SECRET
      remoteRef:
        key: secret/dhanam
        property: metamap_client_secret
    - secretKey: METAMAP_WEBHOOK_SECRET
      remoteRef:
        key: secret/dhanam
        property: metamap_webhook_secret
    - secretKey: FEDERATION_API_TOKEN
      remoteRef:
        key: secret/dhanam
        property: federation_api_token
    - secretKey: METAMAP_FLOW_ID
      remoteRef:
        key: secret/dhanam
        property: metamap_flow_id
    - secretKey: CHECKOUT_ALLOWED_HOSTS
      remoteRef:
        key: secret/dhanam
        property: checkout_allowed_hosts
    - secretKey: SMTP_HOST
      remoteRef:
        key: secret/dhanam
        property: smtp_host
    - secretKey: SMTP_PORT
      remoteRef:
        key: secret/dhanam
        property: smtp_port
    - secretKey: SMTP_USER
      remoteRef:
        key: secret/dhanam
        property: smtp_user
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: secret/dhanam
        property: smtp_password
    - secretKey: EMAIL_FROM
      remoteRef:
        key: secret/dhanam
        property: email_from
    - secretKey: BANXICO_API_TOKEN
      remoteRef:
        key: secret/dhanam
        property: banxico_api_token
    - secretKey: SENTRY_DSN
      remoteRef:
        key: secret/dhanam
        property: sentry_dsn

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dhanam-janua-secrets
  namespace: dhanam
  labels:
    app.kubernetes.io/managed-by: enclii
spec:
  refreshInterval: 15m
  # Production bridge while Vault write policy remains read-only for new paths.
  # Source secret: enclii/dhanam-production-janua-source.
  secretStoreRef:
    name: kubernetes-store
    kind: ClusterSecretStore
  target:
    name: dhanam-janua-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: dhanam-production-janua-source
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

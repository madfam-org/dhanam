# =============================================================================
# Dhanam Cloudflare Tunnel Routes
# =============================================================================
# Reference only. The active Enclii tunnel is remotely managed through
# Cloudflare's Tunnel Configuration API. Add or change routes through Enclii
# provider adapters; raw Cloudflare edits are documented break-glass only.
#
# Location: cloudflared-unified.yaml (or equivalent)
# Section: config.yaml → ingress
# =============================================================================

# -----------------------------------------------------------------------------
# ROUTES TO ADD TO CLOUDFLARED CONFIGMAP
# -----------------------------------------------------------------------------
# Add the following entries to the ingress section of your cloudflared config:
#
#   # =========================================================================
#   # Dhanam - Personal Finance & Wealth Management
#   # =========================================================================
#   - hostname: app.dhan.am
#     service: http://dhanam-web.dhanam.svc.cluster.local:80
#     originRequest:
#       noTLSVerify: true
#
#   - hostname: api.dhan.am
#     service: http://dhanam-api.dhanam.svc.cluster.local:80
#     originRequest:
#       noTLSVerify: true
#
#   - hostname: admin.dhan.am
#     service: http://dhanam-web.dhanam.svc.cluster.local:80  # Same as app.dhan.am (single deployment)
#     originRequest:
#       noTLSVerify: true
#
#   # Landing / SEO domain (apex + www)
#   - hostname: dhan.am
#     service: http://dhanam-web.dhanam.svc.cluster.local:80
#     originRequest:
#       noTLSVerify: true
#
#   - hostname: www.dhan.am
#     service: http://dhanam-web.dhanam.svc.cluster.local:80
#     originRequest:
#       noTLSVerify: true
#
#   # =========================================================================
#   # Dhanam staging - RFC 0001 PP.2b GitOps tier
#   # =========================================================================
#   - hostname: staging.dhan.am
#     service: http://dhanam-web.enclii-dhanam-staging.svc.cluster.local:80
#     originRequest:
#       noTLSVerify: true
#
#   - hostname: staging-api.dhan.am
#     service: http://dhanam-api.enclii-dhanam-staging.svc.cluster.local:80
#     originRequest:
#       noTLSVerify: true
#
#   - hostname: staging-admin.dhan.am
#     service: http://dhanam-admin.enclii-dhanam-staging.svc.cluster.local:80
#     originRequest:
#       noTLSVerify: true
#
# -----------------------------------------------------------------------------

---
# =============================================================================
# Cloudflare DNS Records (via Cloudflare Dashboard or Terraform)
# =============================================================================
# Create CNAME records pointing to your tunnel:
#
# | Type  | Name  | Content                           | Proxy |
# |-------|-------|-----------------------------------|-------|
# | CNAME | app   | <tunnel-id>.cfargotunnel.com     | Yes   |
# | CNAME | api   | <tunnel-id>.cfargotunnel.com     | Yes   |
# | CNAME | admin | <tunnel-id>.cfargotunnel.com     | Yes   |
# | CNAME | @     | <tunnel-id>.cfargotunnel.com     | Yes   |
# | CNAME | www   | <tunnel-id>.cfargotunnel.com     | Yes   |
# | CNAME | staging       | <tunnel-id>.cfargotunnel.com | Yes   |
# | CNAME | staging-api   | <tunnel-id>.cfargotunnel.com | Yes   |
# | CNAME | staging-admin | <tunnel-id>.cfargotunnel.com | Yes   |
#
# Domain: dhan.am
# =============================================================================

---
# =============================================================================
# Alternative: Standalone Ingress for Non-Cloudflare Deployments
# =============================================================================
# If deploying outside the Cloudflare tunnel infrastructure, use this Ingress:

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dhanam-ingress
  namespace: dhanam
  labels:
    app: dhanam
    component: ingress
  annotations:
    # Uncomment for nginx ingress controller
    # kubernetes.io/ingress.class: nginx
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    #
    # Uncomment for cert-manager TLS
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    description: "Dhanam Ingress - Use only if NOT using Cloudflare Tunnel"
spec:
  # Uncomment if using TLS with cert-manager
  # tls:
  #   - hosts:
  #       - app.dhan.am
  #       - api.dhan.am
  #     secretName: dhanam-tls
  rules:
    # Web Frontend
    - host: app.dhan.am
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dhanam-web
                port:
                  number: 80

    # API Backend
    - host: api.dhan.am
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dhanam-api
                port:
                  number: 80

    # Admin Dashboard (same service as app - subdomain routing handled by middleware)
    - host: admin.dhan.am
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dhanam-web
                port:
                  number: 80

    # Landing / SEO domain (apex)
    - host: dhan.am
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dhanam-web
                port:
                  number: 80

    # Landing / SEO domain (www → middleware redirects to apex)
    - host: www.dhan.am
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dhanam-web
                port:
                  number: 80

---
# =============================================================================
# Cloudflare Access Policy (Optional - For Admin Routes)
# =============================================================================
# If using Cloudflare Access for additional protection on admin endpoints:
#
# 1. Create an Access Application in Cloudflare Dashboard:
#    - Name: Dhanam Admin
#    - Domain: api.dhan.am/admin/*
#    - Session Duration: 24h
#
# 2. Create Access Policy:
#    - Allow: Emails ending in @madfam.io
#    - Or: Specific email addresses
#    - Or: Identity provider groups
#
# 3. The API already validates Janua tokens, so this is defense-in-depth
# =============================================================================

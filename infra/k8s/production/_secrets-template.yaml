# =============================================================================
# Dhanam Secrets Template
# =============================================================================
# INSTRUCTIONS:
# 1. Copy this file to secrets.yaml (NOT tracked in git)
# 2. Fill in the actual credentials
# 3. Apply: kubectl apply -f secrets.yaml
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: dhanam-secrets
  namespace: dhanam
  labels:
    app: dhanam
    component: secrets
type: Opaque
stringData:
  # ==========================================================================
  # Database
  # ==========================================================================
  DATABASE_URL: "<postgresql://user:pass@host:5432/dhanam>"

  # ==========================================================================
  # Redis
  # ==========================================================================
  REDIS_URL: "<redis://host:6379/0>"

  # ==========================================================================
  # Encryption (for provider tokens at rest)
  # ==========================================================================
  # IMPORTANT: Must be exactly 32 ASCII characters (not hex-encoded).
  # Validated by Joi `Joi.string().length(32)` in apps/api/src/config/validation.ts
  ENCRYPTION_KEY: "<exactly-32-ascii-characters-key>"

  # ==========================================================================
  # OIDC Client (for Janua SSO)
  # ==========================================================================
  OIDC_CLIENT_ID: "<janua-client-id>"
  OIDC_CLIENT_SECRET: "<janua-client-secret>"

  # ==========================================================================
  # NextAuth (for web frontend)
  # ==========================================================================
  NEXTAUTH_SECRET: "<random-32-char-secret>"

  # ==========================================================================
  # JWT (required by API for local auth fallback)
  # ==========================================================================
  JWT_SECRET: "<random-jwt-secret-min-32-chars>"
  JWT_REFRESH_SECRET: "<random-jwt-refresh-secret-min-32-chars>"

  # ==========================================================================
  # Banxico (FX rates)
  # ==========================================================================
  BANXICO_API_TOKEN: "<banxico-api-token>"

  # ==========================================================================
  # Email / SMTP
  # ==========================================================================
  SMTP_HOST: "<smtp-host>"
  SMTP_PORT: "587"
  SMTP_USER: "<smtp-user>"
  SMTP_PASSWORD: "<smtp-password>"
  EMAIL_FROM: "noreply@dhanam.com"

  # ==========================================================================
  # Analytics (server-side)
  # ==========================================================================
  POSTHOG_API_KEY: "<posthog-api-key>"
  # ==========================================================================
  # Error Monitoring (Sentry)
  # ==========================================================================
  SENTRY_DSN: "<sentry-dsn-url>"

---
# =============================================================================
# Billing Secrets (Stripe MX + Paddle)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: dhanam-billing-secrets
  namespace: dhanam
  labels:
    app: dhanam
    component: billing
  annotations:
    description: "Hybrid Router billing credentials"
    strategy: "stripe-mx-paddle"
type: Opaque
stringData:
  # ==========================================================================
  # Stripe Mexico
  # ==========================================================================
  # Dashboard: https://dashboard.stripe.com/mx
  STRIPE_MX_PUBLISHABLE_KEY: "<pk_live_xxx>"
  STRIPE_MX_SECRET_KEY: "<sk_live_xxx>"
  STRIPE_MX_WEBHOOK_SECRET: "<whsec_xxx>"     # MX SPEI webhook signing secret
  STRIPE_WEBHOOK_SECRET: "<whsec_xxx>"        # legacy Stripe webhook handler in billing.controller.ts

  # ==========================================================================
  # Paddle (Global)
  # ==========================================================================
  # Dashboard: https://vendors.paddle.com
  PADDLE_VENDOR_ID: "<vendor_id>"
  PADDLE_API_KEY: "<paddle_api_key>"
  PADDLE_CLIENT_TOKEN: "<client_token>"
  PADDLE_WEBHOOK_SECRET: "<webhook_secret>"

  # ==========================================================================
  # Conekta direct gateway (LATAM card + SPEI). All optional — service self-
  # disables (isConfigured() returns false) when private key is empty.
  # Dashboard: https://panel.conekta.com
  # ==========================================================================
  CONEKTA_PRIVATE_KEY: "<conekta_private_key>"
  CONEKTA_PUBLIC_KEY: "<conekta_public_key>"
  CONEKTA_WEBHOOK_SIGNING_KEY: "<conekta_webhook_signing_key>"

  # ==========================================================================
  # Credit metering / billing-event ingest HMAC.
  # Wired by credit-billing.controller.ts. Empty value → endpoint refuses
  # signed events (controllers self-gate on missing).
  # ==========================================================================
  BILLING_WEBHOOK_SECRET: "<billing_webhook_secret>"

  # ==========================================================================
  # PhyndCRM engagement-events relay (Stripe MX → PhyndCRM client portal).
  # Same shared secret value as PhyndCRM's PHYNE_ENGAGEMENT_EVENTS_SECRET and
  # Cotiza's PHYNECRM_ENGAGEMENT_SECRET (all three names refer to the same
  # ecosystem-wide HMAC key).
  # ==========================================================================
  PHYNE_ENGAGEMENT_EVENTS_SECRET: "<phyne_engagement_events_secret>"

  # ==========================================================================
  # Inbound MADFAM events receiver (madfam-events.controller.ts).
  # ==========================================================================
  MADFAM_EVENTS_WEBHOOK_SECRET: "<madfam_events_webhook_secret>"

---
# =============================================================================
# Provider Secrets (Financial Integrations)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: dhanam-provider-secrets
  namespace: dhanam
  labels:
    app: dhanam
    component: providers
  annotations:
    description: "Financial provider API credentials"
type: Opaque
stringData:
  # Belvo (Mexico/LATAM banking)
  BELVO_SECRET_KEY_ID: "<belvo-secret-key-id>"
  BELVO_SECRET_KEY_PASSWORD: "<belvo-secret-key-password>"
  BELVO_WEBHOOK_SECRET: "<belvo-webhook-secret>"

  # Plaid (US/Canada banking)
  PLAID_CLIENT_ID: "<plaid-client-id>"
  PLAID_SECRET: "<plaid-secret>"
  PLAID_WEBHOOK_SECRET: "<plaid-webhook-secret>"

  # Bitso (Crypto exchange)
  BITSO_API_KEY: "<bitso-api-key>"
  BITSO_API_SECRET: "<bitso-api-secret>"

  # Zapper (DeFi portfolio)
  ZAPPER_API_KEY: "<zapper-api-key>"

  # Zillow (Real estate — API deprecated 2021, may use alternative)
  # ZILLOW_API_KEY: "<zillow-api-key>"

  # MX (US/Canada aggregation — optional)
  # MX_API_KEY: "<mx-api-key>"
  # MX_CLIENT_ID: "<mx-client-id>"

  # Finicity (US Open Banking — optional)
  # FINICITY_PARTNER_ID: "<finicity-partner-id>"
  # FINICITY_PARTNER_SECRET: "<finicity-partner-secret>"
  # FINICITY_APP_KEY: "<finicity-app-key>"

---
# =============================================================================
# Janua Secrets (MADFAM Identity & Billing Bridge)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: dhanam-janua-secrets
  namespace: dhanam
  labels:
    app: dhanam
    component: janua
  annotations:
    description: "Janua identity platform server-side keys"
type: Opaque
stringData:
  JANUA_API_KEY: "<janua-api-key>"
  JANUA_ADMIN_KEY: "<janua-admin-key>"
  JANUA_API_URL: "https://api.janua.dev"
  JANUA_WEBHOOK_SECRET: "<janua-webhook-secret>"
  DHANAM_WEBHOOK_SECRET: "<dhanam-webhook-secret>"

---
# =============================================================================
# NetworkPolicy: Restrict access to billing secrets
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dhanam-secrets-access
  namespace: dhanam
spec:
  podSelector:
    matchLabels:
      app: dhanam-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: cloudflare-tunnel

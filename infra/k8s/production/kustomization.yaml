  newName: ghcr.io/madfam-org/dhanam/api
- digest: sha256:d8258c3df3ed28b7fbd0c377c6bfac29e1f4a2087f082fbb5a6844ac0e5a6b42
  name: dhanam-web
  newName: ghcr.io/madfam-org/dhanam/web

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- namespace.yaml
- api-deployment.yaml
- admin-deployment.yaml
- web-deployment.yaml
- fx-spot-refresh-cronjob.yaml
- catalog-sync-job.yaml
- kyverno-policy-exception.yaml
# Git-managed Vault ES deferred: vault-store cannot read secret/dhanam (TD-1016).
# Platform ES dhanam-ecosystem-service-auth merges into dhanam-secrets instead.
# - external-secret.yaml
- external-secret-janua.yaml
- network-policies.yaml
- pdb.yaml

# Image transformer: maps short names to full GHCR paths
# CI workflows update these entries with @sha256:... digests after each build
images:
- digest: sha256:45b85897626332c3f5fd5331db7256b9938c99d7869da9ef84b14b0e995633e9
  name: dhanam-admin
  newName: ghcr.io/madfam-org/dhanam/admin
- digest: sha256:49c59ea800fb787935ad7743148f87d55d8223d78ad3789aa058e2ffdf80854a
  name: dhanam-api
  newName: ghcr.io/madfam-org/dhanam/api
- digest: sha256:a120e59b83330c255ac9ac7b43eba098b0e17cb1ba1b2d8d900bf693f6b28c72
  name: dhanam-web
  newName: ghcr.io/madfam-org/dhanam/web

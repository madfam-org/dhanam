- digest: sha256:a39ec1b4444e9540629c8e0f0e9ffd42fd81ed70fb14744df12127bc68cf5d00
  name: dhanam-api
  newName: ghcr.io/madfam-org/dhanam/api
- digest: sha256:d7ae5c1c60a58e0ccbaed8c1638f95eff5c3ca8f07fabf8172677b31db826ba8
  name: dhanam-web
  newName: ghcr.io/madfam-org/dhanam/web

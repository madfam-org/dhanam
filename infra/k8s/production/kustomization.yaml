  name: dhanam-admin
  newName: ghcr.io/madfam-org/dhanam/admin
- digest: sha256:678c05963201abd31b749fa850308665b889c35ea3bbbd417c2febabaf26d975
  name: dhanam-api
  newName: ghcr.io/madfam-org/dhanam/api
- digest: sha256:126661e221a67a335eddaf885c142464f82c50f2edb7c6730f79f801548bf054
  name: dhanam-web
  newName: ghcr.io/madfam-org/dhanam/web

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dhanam-billing-secrets
  labels:
    app.kubernetes.io/managed-by: enclii
spec:
  refreshInterval: 15m
  # Staging uses the Enclii Kubernetes-store bridge until Vault write policy is
  # expanded for secret/dhanam/staging*. Source secret:
  # enclii/dhanam-staging-billing-source.
  secretStoreRef:
    name: kubernetes-store
    kind: ClusterSecretStore
  target:
    name: dhanam-billing-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: dhanam-staging-billing-source
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dhanam-provider-secrets
  labels:
    app.kubernetes.io/managed-by: enclii
spec:
  refreshInterval: 15m
  # Source secret: enclii/dhanam-staging-provider-source.
  secretStoreRef:
    name: kubernetes-store
    kind: ClusterSecretStore
  target:
    name: dhanam-provider-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: dhanam-staging-provider-source

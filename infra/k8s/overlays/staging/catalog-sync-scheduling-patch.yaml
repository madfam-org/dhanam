# Staging catalog sync must avoid control-plane nodes where cluster DNS
# intermittently fails external lookups (api.stripe.com, postgres.data.svc).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: dhanam-catalog-sync
spec:
  jobTemplate:
    spec:
      template:
        spec:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io/control-plane
                        operator: DoesNotExist

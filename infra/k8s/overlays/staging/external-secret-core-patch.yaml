apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dhanam-secrets
spec:
  # Staging uses the Enclii Kubernetes-store bridge while the Vault ESO token is
  # read-only for secret/dhanam/staging*. Source secret:
  # enclii/dhanam-staging-core-source. Move this back to vault-store after the
  # Vault policy allows writes to the staging paths and they are populated.
  secretStoreRef:
    name: kubernetes-store
    kind: ClusterSecretStore
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: dhanam-staging-core-source
        property: DATABASE_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: dhanam-staging-core-source
        property: REDIS_URL
    - secretKey: JWT_SECRET
      remoteRef:
        key: dhanam-staging-core-source
        property: JWT_SECRET
    - secretKey: JWT_REFRESH_SECRET
      remoteRef:
        key: dhanam-staging-core-source
        property: JWT_REFRESH_SECRET
    - secretKey: OIDC_CLIENT_ID
      remoteRef:
        key: dhanam-staging-core-source
        property: OIDC_CLIENT_ID
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: dhanam-staging-core-source
        property: OIDC_CLIENT_SECRET
    - secretKey: OIDC_ISSUER
      remoteRef:
        key: dhanam-staging-core-source
        property: OIDC_ISSUER
    - secretKey: NEXTAUTH_SECRET
      remoteRef:
        key: dhanam-staging-core-source
        property: NEXTAUTH_SECRET
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: dhanam-staging-core-source
        property: STRIPE_SECRET_KEY
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: dhanam-staging-core-source
        property: STRIPE_WEBHOOK_SECRET
    - secretKey: SENDGRID_API_KEY
      remoteRef:
        key: dhanam-staging-core-source
        property: SENDGRID_API_KEY
    - secretKey: COTIZA_WEBHOOK_SECRET
      remoteRef:
        key: dhanam-staging-core-source
        property: COTIZA_WEBHOOK_SECRET
    - secretKey: METAMAP_CLIENT_ID
      remoteRef:
        key: dhanam-staging-core-source
        property: METAMAP_CLIENT_ID
    - secretKey: METAMAP_CLIENT_SECRET
      remoteRef:
        key: dhanam-staging-core-source
        property: METAMAP_CLIENT_SECRET
    - secretKey: METAMAP_WEBHOOK_SECRET
      remoteRef:
        key: dhanam-staging-core-source
        property: METAMAP_WEBHOOK_SECRET
    - secretKey: FEDERATION_API_TOKEN
      remoteRef:
        key: dhanam-staging-core-source
        property: FEDERATION_API_TOKEN
    - secretKey: POSTHOG_API_KEY
      remoteRef:
        key: dhanam-staging-core-source
        property: POSTHOG_API_KEY
    - secretKey: METAMAP_FLOW_ID
      remoteRef:
        key: dhanam-staging-core-source
        property: METAMAP_FLOW_ID
    - secretKey: CHECKOUT_ALLOWED_HOSTS
      remoteRef:
        key: dhanam-staging-core-source
        property: CHECKOUT_ALLOWED_HOSTS
    - secretKey: SMTP_HOST
      remoteRef:
        key: dhanam-staging-core-source
        property: SMTP_HOST
    - secretKey: SMTP_PORT
      remoteRef:
        key: dhanam-staging-core-source
        property: SMTP_PORT
    - secretKey: SMTP_USER
      remoteRef:
        key: dhanam-staging-core-source
        property: SMTP_USER
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: dhanam-staging-core-source
        property: SMTP_PASSWORD
    - secretKey: EMAIL_FROM
      remoteRef:
        key: dhanam-staging-core-source
        property: EMAIL_FROM
    - secretKey: BANXICO_API_TOKEN
      remoteRef:
        key: dhanam-staging-core-source
        property: BANXICO_API_TOKEN
    - secretKey: R2_ACCESS_KEY_ID
      remoteRef:
        key: dhanam-staging-core-source
        property: R2_ACCESS_KEY_ID
    - secretKey: R2_SECRET_ACCESS_KEY
      remoteRef:
        key: dhanam-staging-core-source
        property: R2_SECRET_ACCESS_KEY
    - secretKey: R2_ENDPOINT
      remoteRef:
        key: dhanam-staging-core-source
        property: R2_ENDPOINT
    - secretKey: CLOUDFLARE_API_TOKEN
      remoteRef:
        key: dhanam-staging-core-source
        property: CLOUDFLARE_API_TOKEN
    - secretKey: NEXT_PUBLIC_POSTHOG_KEY
      remoteRef:
        key: dhanam-staging-core-source
        property: NEXT_PUBLIC_POSTHOG_KEY
    - secretKey: SESSION_SECRET
      remoteRef:
        key: dhanam-staging-core-source
        property: SESSION_SECRET
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: dhanam-staging-core-source
        property: ENCRYPTION_KEY
    - secretKey: SENTRY_DSN
      remoteRef:
        key: dhanam-staging-core-source
        property: SENTRY_DSN

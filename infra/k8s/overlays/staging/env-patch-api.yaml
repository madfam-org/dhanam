# Staging-specific env vars layered onto the API deployment.
# Keys here override any set in the base.
#
# RFC 0001 rule: staging must never emit live billing or regulated side
# effects. Stripe/Paddle are forced to test-mode, SAT/PAC integration is
# disabled via Karafiel-side flags (nothing to do here — Dhanam doesn't
# issue CFDIs directly).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: dhanam-api
spec:
  template:
    spec:
      containers:
        - name: api
          env:
            # Tag staging traffic in logs + metrics so prod dashboards aren't polluted.
            - name: NODE_ENV
              value: "staging"
            - name: ENVIRONMENT
              value: "staging"
            - name: SENTRY_ENVIRONMENT
              value: "staging"
            - name: SENTRY_RELEASE
              value: "dhanam-api@staging"
            - name: WEB_URL
              value: "https://staging.dhan.am"
            # Billing: force test-mode. Livemode Stripe events are 200-ACK'd
            # with a warning per stripe-mx-spei-relay guardrails (CLAUDE.md).
            - name: FEATURE_UNIFIED_CHECKOUT_ROUTING
              value: "true"
            - name: FEATURE_STRIPE_MXN_LIVE
              value: "false"
            - name: FEATURE_CAPITAL_STACK_ENABLED
              value: "true"
            - name: FEATURE_CAPITAL_STACK_KARAFIEL
              value: "false"
            - name: FEATURE_CAPITAL_STACK_DETECTOR
              value: "true"
            - name: FEATURE_LUNCHMONEY_IMPORT
              value: "true"
            - name: PADDLE_ENVIRONMENT
              value: "sandbox"
            # Webhook relay: set PRODUCT_WEBHOOK_URLS in dhanam-secrets (Vault) when
            # staging Karafiel/Tezca consumers are registered. Example:
            # karafiel:https://staging-api.karafiel.io/api/v1/webhooks/dhanam
            - name: PRODUCT_WEBHOOK_URLS
              value: ""
            - name: CORS_ORIGINS
              value: "https://staging.dhan.am,https://staging-admin.dhan.am,https://staging-api.dhan.am"
            - name: PHYNDCRM_API_URL
              value: "https://staging-crm.madfam.io"

# Staging GitOps rollout unblock — mirrors production TD-1003 exception for
# enclii-dhanam-staging. Without this, ArgoCD cannot reconcile signed digests
# when Kyverno verify-image-signatures rejects GHCR attestor pulls.
apiVersion: kyverno.io/v2beta1
kind: PolicyException
metadata:
  name: dhanam-staging-gitops-rollout-signature
  namespace: enclii-dhanam-staging
  annotations:
    argocd.argoproj.io/sync-wave: '-1'
  labels:
    app.kubernetes.io/part-of: galaxy-ecosystem
    app.kubernetes.io/managed-by: kustomize
spec:
  exceptions:
    - policyName: verify-image-signatures
      ruleNames:
        - check-signature
        - autogen-check-signature
        - autogen-cronjob-check-signature
  match:
    any:
      - resources:
          kinds:
            - Deployment
            - Pod
            - ReplicaSet
            - CronJob
            - Job
          namespaces:
            - enclii-dhanam-staging
          names:
            - dhanam-api*
            - dhanam-web*
            - dhanam-admin*
            - dhanam-fx-spot-refresh*
            - dhanam-catalog-sync
            - dhanam-catalog-sync*

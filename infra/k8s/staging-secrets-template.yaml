# =============================================================================
# Dhanam Staging Secrets Template (PP.2b — RFC 0001)
# =============================================================================
# Operator workflow:
#   1. cp infra/k8s/staging-secrets-template.yaml /tmp/dhanam-staging-secrets.yaml
#   2. Fill in every <placeholder> with a STAGING credential. Never copy
#      production values. Every external key must be test/sandbox mode:
#        - Stripe: sk_test_... (MX account's test mode)
#        - Paddle: sandbox vendor
#        - Belvo: sandbox institutions only
#        - Plaid: sandbox
#        - Bitso: stage env API keys
#        - Janua: staging tenant client (jnc_stg_...)
#        - MetaMap: sandbox merchant
#   3. kubectl apply -f /tmp/dhanam-staging-secrets.yaml
#   4. rm /tmp/dhanam-staging-secrets.yaml
#   5. DO NOT commit the filled file. This template stays in git; the secrets
#      themselves never do.
#
# Secret-name deviation from RFC 0001: we keep the same K8s secret names as
# prod (dhanam-secrets, dhanam-billing-secrets, etc.) but scope them to the
# dhanam-staging namespace. RFC 0010 may rename them to *-staging-* later;
# until then, namespace isolation is the boundary.
# =============================================================================

---
# Core API secrets (DB, Redis, encryption, JWT, Janua OIDC, SMTP, Banxico,
# Federation, webhooks).
apiVersion: v1
kind: Secret
metadata:
  name: dhanam-secrets
  namespace: dhanam-staging
  labels:
    app: dhanam
    environment: staging
type: Opaque
stringData:
  # DB + cache (point at the staging PG/Redis tier — smaller instances per RFC 0001)
  DATABASE_URL: "<postgresql://USER:PASS@staging-pg/dhanam_staging>"
  REDIS_URL: "<redis://staging-redis:6379/1>"

  # AES-256-GCM master key. Must be exactly 32 ASCII chars. Generate fresh
  # for staging; never reuse the prod key.
  ENCRYPTION_KEY: "<exactly-32-ascii-chars-staging-key>"

  # OIDC (Janua staging tenant)
  OIDC_CLIENT_ID: "<janua-staging-client-id>"
  OIDC_CLIENT_SECRET: "<janua-staging-client-secret>"

  # JWT (rotating; generate fresh per env)
  NEXTAUTH_SECRET: "<openssl rand -base64 32>"
  JWT_SECRET: "<openssl rand -base64 48>"
  JWT_REFRESH_SECRET: "<openssl rand -base64 48>"

  # Email (Resend test domain or Mailhog — never live SMTP)
  SMTP_HOST: "<smtp-staging-host>"
  SMTP_PORT: "587"
  SMTP_USER: "<smtp-test-user>"
  SMTP_PASSWORD: "<smtp-test-pass>"
  EMAIL_FROM: "staging-noreply@dhan.am"

  # Banxico (FX). Same API surface as prod; token can be shared if Banxico
  # allows it, otherwise provision a staging-only token.
  BANXICO_API_TOKEN: "<banxico-api-token>"

  # Outbound webhook HMAC secret (signs ecosystem fan-out from staging).
  # Consumers (karafiel-staging, etc.) must register this same secret.
  DHANAM_WEBHOOK_SECRET: "<openssl rand -hex 32>"

  # Inbound MADFAM events receiver secret
  MADFAM_EVENTS_WEBHOOK_SECRET: "<openssl rand -hex 32>"

  # Cotiza inbound webhook secret (staging tenant)
  COTIZA_WEBHOOK_SECRET: "<openssl rand -hex 32>"

  # Ecosystem fan-out targets (CSV). Leave empty to disable relay in staging.
  # Example: "karafiel:https://staging-api.karafiel.io/api/v1/webhooks/dhanam"
  PRODUCT_WEBHOOK_URLS: ""

  # Sentry (staging DSN — separate project from prod)
  SENTRY_DSN: "<sentry-staging-dsn>"

  # Federation API token (inter-service, staging credential)
  FEDERATION_API_TOKEN: "<openssl rand -hex 32>"

  # KYC — MetaMap sandbox
  METAMAP_CLIENT_ID: "<metamap-sandbox-client-id>"
  METAMAP_CLIENT_SECRET: "<metamap-sandbox-client-secret>"
  METAMAP_WEBHOOK_SECRET: "<openssl rand -hex 32>"

  # OpenAI (staging key with low rate limit)
  OPENAI_API_KEY: "<openai-staging-key>"

---
# Billing secrets (Stripe MX, Paddle — both in test/sandbox mode).
# env-patch-api.yaml forces FEATURE_STRIPE_MXN_LIVE=false and
# PADDLE_ENVIRONMENT=sandbox; this secret must match.
apiVersion: v1
kind: Secret
metadata:
  name: dhanam-billing-secrets
  namespace: dhanam-staging
  labels:
    app: dhanam
    environment: staging
type: Opaque
stringData:
  STRIPE_MX_SECRET_KEY: "<sk_test_...>"
  STRIPE_MX_WEBHOOK_SECRET: "<whsec_test_...>"      # MX SPEI webhook
  STRIPE_WEBHOOK_SECRET: "<whsec_test_...>"         # legacy Stripe webhook handler
  STRIPE_MX_PUBLISHABLE_KEY: "<pk_test_...>"
  PADDLE_VENDOR_ID: "<sandbox-vendor-id>"
  PADDLE_API_KEY: "<sandbox-api-key>"
  PADDLE_CLIENT_TOKEN: "<sandbox-client-token>"
  PADDLE_WEBHOOK_SECRET: "<sandbox-webhook-secret>"

  # Conekta sandbox (LATAM direct gateway). Empty values are fine in staging —
  # ConektaService self-disables via isConfigured().
  CONEKTA_PRIVATE_KEY: ""
  CONEKTA_PUBLIC_KEY: ""
  CONEKTA_WEBHOOK_SIGNING_KEY: ""

  # Credit metering ingest HMAC (sandbox). Generate fresh per env.
  BILLING_WEBHOOK_SECRET: "<openssl rand -hex 32>"

  # PhyneCRM engagement-events relay (must match phyne-crm-staging shared secret).
  PHYNE_ENGAGEMENT_EVENTS_SECRET: "<openssl rand -hex 32>"

  # Inbound MADFAM events receiver — moved to dhanam-billing-secrets so prod +
  # staging both source it from the same Secret as the rest of the billing
  # webhook surface. dhanam-secrets continues to carry it for backward compat
  # with any pinned image; prefer this one going forward.
  MADFAM_EVENTS_WEBHOOK_SECRET: "<openssl rand -hex 32>"

---
# Provider secrets (bank aggregators, crypto, DeFi — all sandbox).
apiVersion: v1
kind: Secret
metadata:
  name: dhanam-provider-secrets
  namespace: dhanam-staging
  labels:
    app: dhanam
    environment: staging
type: Opaque
stringData:
  # Belvo (Mexico/LATAM) — sandbox institutions
  BELVO_SECRET_KEY_ID: "<belvo-sandbox-key-id>"
  BELVO_SECRET_KEY_PASSWORD: "<belvo-sandbox-password>"
  BELVO_WEBHOOK_SECRET: "<openssl rand -hex 32>"
  # Plaid (US/Canada) — sandbox
  PLAID_CLIENT_ID: "<plaid-sandbox-client-id>"
  PLAID_SECRET: "<plaid-sandbox-secret>"
  PLAID_WEBHOOK_SECRET: "<openssl rand -hex 32>"
  # Bitso (crypto) — stage env
  BITSO_API_KEY: "<bitso-stage-key>"
  BITSO_API_SECRET: "<bitso-stage-secret>"
  # Zapper (DeFi) — free tier key or staging-rate-limited
  ZAPPER_API_KEY: "<zapper-staging-key>"

---
# Janua server-side keys (staging tenant).
apiVersion: v1
kind: Secret
metadata:
  name: dhanam-janua-secrets
  namespace: dhanam-staging
  labels:
    app: dhanam
    environment: staging
type: Opaque
stringData:
  JANUA_API_KEY: "<janua-staging-service-key>"
  JANUA_ADMIN_KEY: "<janua-staging-admin-key>"
  JANUA_API_URL: "https://api.janua.dev"
  JANUA_WEBHOOK_SECRET: "<janua-staging-webhook-secret>"
  DHANAM_WEBHOOK_SECRET: "<must match dhanam-secrets DHANAM_WEBHOOK_SECRET>"
